# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_DEVICE_NAME="Saaqib Macropad"

# USB (for wired use and flashing)
CONFIG_ZMK_USB=y

# Encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Sleep settings — saves battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Display off when idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Logging off for production
CONFIG_ZMK_LOG_LEVEL_WRN=y
